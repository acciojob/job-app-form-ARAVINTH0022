<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application Form</title>
</head>
<body>
    <form action="/submit" method="post">
        
        <!-- Name -->
        <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>

        <!-- Email -->
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>

        <!-- Gender (Radio Buttons) -->
        <div>
            <label>Gender</label>
            <input type="radio" id="gender_male" name="gender" value="male" required>
            <label for="gender_male">Male</label>
            
            <input type="radio" id="gender_female" name="gender" value="female" required>
            <label for="gender_female">Female</label>
        </div>

        <!-- Laptop Brands (Dropdown) -->
        <div>
            <label for="laptop">Laptop Brands</label>
            <select id="laptop" name="laptop">
                <option value="Apple">Apple</option>
                <option value="Asus">Asus</option>
                <option value="HP">HP</option>
            </select>
        </div>

        <!-- Age -->
        <div>
            <label for="age">Age</label>
            <input type="number" id="age" name="age" required>
        </div>

        <!-- Date of Birth -->
        <div>
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" required>
        </div>

        <!-- Password -->
        <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>

        <!-- Portfolio URL -->
        <div>
            <label for="portfolio">Portfolio URL</label>
            <input type="url" id="portfolio" name="portfolio">
        </div>

        <!-- Submit Button -->
        <div>
            <button type="submit">Submit</button>
        </div>

    </form>
</body>
</html>   
<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
